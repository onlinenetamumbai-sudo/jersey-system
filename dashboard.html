<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Sports Jersey CRM</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-200 p-3 md:p-5">

<!-- TOAST -->

<div id="toast"

style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
color:white;
padding:18px 35px;
border-radius:15px;
font-weight:bold;
font-size:18px;
display:none;
z-index:999999;
box-shadow:0 0 25px rgba(0,0,0,0.4);
">

</div>

<script>

  // ==========================================
  // LOGIN CHECK
  // ==========================================

  const loggedDealer =
    JSON.parse(localStorage.getItem("loggedDealer"));

  if (!loggedDealer) {

    window.location.href =
      "index.html";

  }

</script>

<!-- HEADER -->

<div class="bg-black text-white rounded-3xl p-6 flex justify-between items-center mb-5">

  <div>

    <h1 class="text-3xl md:text-5xl font-bold">

      SPORTS JERSEY CRM

    </h1>

    <p class="mt-3 text-lg">

      Welcome:
      <span id="dealerName"></span>

    </p>

  </div>

  <button id="logoutBtn"
          class="bg-red-500 px-6 py-4 rounded-2xl font-bold">

    Logout

  </button>

</div>

<!-- MAIN -->

<div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

  <!-- LEFT -->

  <div class="bg-white rounded-3xl p-5 shadow-lg">

    <!-- CREATE TEAM -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Create New Team

      </label>

      <div class="flex gap-3 mt-3">

        <input type="text"
               id="teamName"
               placeholder="Enter Team Name"
               class="w-full border rounded-2xl p-4">

        <button id="createTeamBtn"
                class="bg-black text-white px-8 rounded-2xl font-bold whitespace-nowrap">

          Create Team

        </button>

      </div>

    </div>

    <!-- TEAM SELECT -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Select Existing Team

      </label>

      <select id="teamSelect"
              class="w-full border rounded-2xl p-4 mt-3">

        <option value="">
          Select Team
        </option>

      </select>

    </div>

    <!-- PLAYER -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Player Name

      </label>

      <input type="text"
             id="playerName"
             class="w-full border rounded-2xl p-4 mt-3">

    </div>

    <!-- SIZE -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Jersey Size

      </label>

      <select id="jerseySize"
              class="w-full border rounded-2xl p-4 mt-3">

        <option value="">Select Size</option>

        <option>20</option>
        <option>22</option>
        <option>24</option>
        <option>26</option>
        <option>28</option>
        <option>30</option>
        <option>32</option>
        <option>34</option>
        <option>36</option>
        <option>38</option>
        <option>40</option>
        <option>42</option>
        <option>44</option>
        <option>46</option>
        <option>48</option>

      </select>

    </div>

    <!-- TYPE -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Jersey Type

      </label>

      <select id="jerseyType"
              class="w-full border rounded-2xl p-4 mt-3">

        <option value="">Select Type</option>

        <option>Half Sleeve</option>
        <option>Full Sleeve</option>
        <option>Sleeveless</option>

      </select>

    </div>

    <!-- NUMBER -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Jersey Number

      </label>

      <input type="text"
             id="jerseyNumber"
             class="w-full border rounded-2xl p-4 mt-3">

    </div>

    <!-- NOTES -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Notes

      </label>

      <textarea id="notes"
                rows="5"
                class="w-full border rounded-2xl p-4 mt-3"></textarea>

    </div>

    <!-- NOTE -->

    <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded-xl mb-5">

      <p class="font-bold">

        IMPORTANT NOTE

      </p>

      <p>

        Please clear the fields when you enter data for a new team.

      </p>

    </div>

    <!-- ADD PLAYER -->

    <button id="addPlayerBtn"
            class="w-full bg-black text-white p-5 rounded-2xl text-xl font-bold">

      Add Player

    </button>

  </div>

  <!-- RIGHT -->

  <div class="bg-white rounded-3xl p-5 shadow-lg">

    <div class="flex justify-between items-center mb-5">

      <h2 class="text-3xl font-bold">

        Team Players

      </h2>

      <button id="pdfBtn"
              class="bg-red-500 text-white px-6 py-3 rounded-2xl">

        PDF

      </button>

    </div>

    <!-- TABLE -->

    <div class="overflow-auto">

      <table class="w-full border">

        <thead>

          <tr class="bg-black text-white">

            <th class="border p-3 w-10">SR</th>
            <th class="border p-3">PLAYER</th>
            <th class="border p-3">SIZE</th>
            <th class="border p-3">TYPE</th>
            <th class="border p-3">NUMBER</th>
            <th class="border p-3">ACTION</th>

          </tr>

        </thead>

        <tbody id="previewTable"></tbody>

      </table>

    </div>

    <!-- TOTAL -->

    <div class="mt-5 text-xl font-bold">

      Total Qty:
      <span id="totalQty">0</span>

    </div>

    <!-- BUTTONS -->

    <div class="mt-5 flex gap-3 flex-wrap">

      <button id="saveBtn"
              class="bg-green-500 text-white px-6 py-4 rounded-2xl font-bold">

        Save Team

      </button>

      <button id="updateBtn"
              class="bg-blue-500 text-white px-6 py-4 rounded-2xl font-bold">

        Update Team

      </button>

      <button id="clearBtn"
              class="bg-gray-700 text-white px-6 py-4 rounded-2xl font-bold">

        Clear

      </button>

    </div>

  </div>

</div>

<script>

  // ==========================================
  // SCRIPT URL
  // ==========================================

  const scriptURL =
    "https://script.google.com/macros/s/AKfycbzoOLyybFoSR-BonHEH_7FxSKkyPwMGqle1Qzlx771iZ6Fxnc4DdKp4yrGoOcJVGalH0g/exec";

  // ==========================================
  // DEALER
  // ==========================================

  document.getElementById("dealerName")
    .innerText = loggedDealer.name;

  // ==========================================
  // VARIABLES
  // ==========================================

  let orders = [];

  let currentTeam = "";

  const previewTable =
    document.getElementById("previewTable");

  // ==========================================
  // TOAST
  // ==========================================

  function showToast(message) {

    const toast =
      document.getElementById("toast");

    toast.innerText = message;

    toast.style.display = "block";

    setTimeout(() => {

      toast.style.display = "none";

    }, 2000);

  }

  // ==========================================
  // LOAD TEAMS
  // ==========================================

  async function loadTeams() {

    try {

      const response =
        await fetch(

          scriptURL +
          "?dealerName=" +
          loggedDealer.name

        );

      const teams =
        await response.json();

      const select =
        document.getElementById("teamSelect");

      select.innerHTML =

        `<option value="">
          Select Team
        </option>`;

      const uniqueTeams =
        [...new Set(teams)];

      uniqueTeams.forEach(team => {

        if (team && team !== "") {

          select.innerHTML += `

            <option value="${team}">
              ${team}
            </option>

          `;

        }

      });

    }

    catch(error) {

      console.log(error);

    }

  }

  // ==========================================
  // PAGE LOAD
  // ==========================================

  window.onload = function () {

    loadTeams();

  }

  // ==========================================
  // CREATE TEAM
  // ==========================================

  document.getElementById("createTeamBtn")

  .addEventListener("click", async function () {

    const teamName =
      document.getElementById("teamName")
      .value
      .trim();

    if (!teamName) {

      showToast("Enter Team Name");

      return;

    }

    currentTeam = teamName;

    orders = [];

    renderTable();

    const finalData = {

      dealerName:
        loggedDealer.name,

      dealerMobile:
        loggedDealer.mobile,

      teamName:
        currentTeam,

      players: []

    };

    try {

      await fetch(scriptURL, {

        method: "POST",

        mode: "no-cors",

        headers: {

          "Content-Type":
            "text/plain;charset=utf-8"

        },

        body:
          JSON.stringify(finalData)

      });

      const select =
        document.getElementById("teamSelect");

      const option =
        document.createElement("option");

      option.value = teamName;

      option.text = teamName;

      select.appendChild(option);

      select.value = teamName;

      showToast("Team Created Successfully");

    }

    catch(error) {

      console.log(error);

      showToast("Create Failed");

    }

  });

  // ==========================================
  // SELECT TEAM
  // ==========================================

  document.getElementById("teamSelect")

  .addEventListener("change",

    async function () {

      const teamName =
        this.value;

      currentTeam = teamName;

      document.getElementById("teamName")
        .value = teamName;

      try {

        const response =
          await fetch(

            scriptURL +
            "?dealerName=" +

            loggedDealer.name +

            "&teamName=" +

            encodeURIComponent(teamName)

          );

        const data =
          await response.json();

        orders =
          data.players || [];

        renderTable();

        showToast("Team Loaded");

      }

      catch(error) {

        console.log(error);

      }

    }

  );

  // ==========================================
  // ADD PLAYER
  // ==========================================

  document.getElementById("addPlayerBtn")

  .addEventListener("click", function () {

    const playerName =
      document.getElementById("playerName").value;

    const jerseySize =
      document.getElementById("jerseySize").value;

    const jerseyType =
      document.getElementById("jerseyType").value;

    const jerseyNumber =
      document.getElementById("jerseyNumber").value;

    const notes =
      document.getElementById("notes").value;

    if (

      !currentTeam ||
      !playerName ||
      !jerseySize ||
      !jerseyType ||
      !jerseyNumber

    ) {

      showToast("Fill All Fields");

      return;

    }

    orders.push({

      jerseyName: playerName,

      jerseySize,

      jerseyType,

      jerseyNumber,

      notes

    });

    renderTable();

    document.getElementById("playerName").value = "";

    document.getElementById("jerseySize").value = "";

    document.getElementById("jerseyType").value = "";

    document.getElementById("jerseyNumber").value = "";

    document.getElementById("notes").value = "";

    showToast("Player Added");

  });

  // ==========================================
  // RENDER TABLE
  // ==========================================

  function renderTable() {

    previewTable.innerHTML = "";

    document.getElementById("totalQty")
      .innerText = orders.length;

    orders.forEach((player, index) => {

      previewTable.innerHTML += `

      <tr>

        <td class="border p-3 text-center">

          ${index + 1}

        </td>

        <td class="border p-3">

          ${player.jerseyName}

        </td>

        <td class="border p-3 text-center">

          ${player.jerseySize}

        </td>

        <td class="border p-3 text-center">

          ${player.jerseyType}

        </td>

        <td class="border p-3 text-center">

          ${player.jerseyNumber}

        </td>

        <td class="border p-3 text-center">

          <div class="flex gap-2 justify-center">

            <button
              onclick="editPlayer(${index})"
              class="bg-blue-500 text-white px-3 py-2 rounded-xl">

              Edit

            </button>

            <button
              onclick="deletePlayer(${index})"
              class="bg-red-500 text-white px-3 py-2 rounded-xl">

              Delete

            </button>

          </div>

        </td>

      </tr>

      `;

    });

  }

  // ==========================================
  // EDIT PLAYER
  // ==========================================

  function editPlayer(index) {

    const player = orders[index];

    document.getElementById("playerName").value =
      player.jerseyName;

    document.getElementById("jerseySize").value =
      player.jerseySize;

    document.getElementById("jerseyType").value =
      player.jerseyType;

    document.getElementById("jerseyNumber").value =
      player.jerseyNumber;

    document.getElementById("notes").value =
      player.notes;

    orders.splice(index, 1);

    renderTable();

    showToast("Player Loaded");

  }

  // ==========================================
  // DELETE PLAYER
  // ==========================================

  function deletePlayer(index) {

    orders.splice(index, 1);

    renderTable();

    showToast("Player Deleted");

  }

  // ==========================================
  // SAVE TEAM
  // ==========================================

  document.getElementById("saveBtn")

  .addEventListener("click", async function () {

    if (

      !currentTeam ||
      orders.length === 0

    ) {

      showToast("No Players Found");

      return;

    }

    const finalData = {

      dealerName:
        loggedDealer.name,

      dealerMobile:
        loggedDealer.mobile,

      teamName:
        currentTeam,

      players: orders

    };

    try {

      await fetch(scriptURL, {

        method: "POST",

        mode: "no-cors",

        headers: {

          "Content-Type":
            "text/plain;charset=utf-8"

        },

        body:
          JSON.stringify(finalData)

      });

      showToast("Team Saved");

      loadTeams();

    }

    catch(error) {

      console.log(error);

      showToast("Save Failed");

    }

  });

  // ==========================================
  // UPDATE TEAM
  // ==========================================

  document.getElementById("updateBtn")

  .addEventListener("click", async function () {

    if (

      !currentTeam ||
      orders.length === 0

    ) {

      showToast("No Team Found");

      return;

    }

    const finalData = {

      dealerName:
        loggedDealer.name,

      dealerMobile:
        loggedDealer.mobile,

      teamName:
        currentTeam,

      players: orders

    };

    try {

      await fetch(scriptURL, {

        method: "POST",

        mode: "no-cors",

        headers: {

          "Content-Type":
            "text/plain;charset=utf-8"

        },

        body:
          JSON.stringify(finalData)

      });

      showToast("Team Updated");

      loadTeams();

    }

    catch(error) {

      console.log(error);

      showToast("Update Failed");

    }

  });

  // ==========================================
  // PDF
  // ==========================================

  document.getElementById("pdfBtn")

  .addEventListener("click", function () {

    if (orders.length === 0) {

      showToast("No Players Found");

      return;

    }

    const { jsPDF } =
      window.jspdf;

    const doc =
      new jsPDF();

    doc.setFontSize(20);

    doc.text(

      "TEAM ORDER DETAILS",

      60,
      20

    );

    doc.setFontSize(12);

    doc.text(

      "TEAM NAME : " +
      currentTeam,

      20,
      40

    );

    doc.text(

      "DEALER : " +
      loggedDealer.name,

      20,
      50

    );

    let y = 70;

    doc.text("SR", 20, y);

    doc.text("PLAYER", 40, y);

    doc.text("SIZE", 90, y);

    doc.text("TYPE", 120, y);

    doc.text("NUMBER", 170, y);

    y += 10;

    orders.forEach((p, i) => {

      doc.text(
        String(i + 1),
        20,
        y
      );

      doc.text(
        p.jerseyName,
        40,
        y
      );

      doc.text(
        p.jerseySize,
        90,
        y
      );

      doc.text(
        p.jerseyType,
        120,
        y
      );

      doc.text(
        p.jerseyNumber,
        170,
        y
      );

      y += 10;

    });

    doc.save(

      currentTeam + ".pdf"

    );

  });

  // ==========================================
  // CLEAR
  // ==========================================

  document.getElementById("clearBtn")

  .addEventListener("click", function () {

    orders = [];

    renderTable();

    document.getElementById("teamName").value = "";

    document.getElementById("teamSelect").value = "";

    document.getElementById("playerName").value = "";

    document.getElementById("jerseySize").value = "";

    document.getElementById("jerseyType").value = "";

    document.getElementById("jerseyNumber").value = "";

    document.getElementById("notes").value = "";

    currentTeam = "";

    showToast("Fields Cleared");

  });

  // ==========================================
  // LOGOUT
  // ==========================================

  document.getElementById("logoutBtn")

  .addEventListener("click", function () {

    localStorage.removeItem("loggedDealer");

    window.location.href =
      "index.html";

  });

</script>

</body>
</html>
