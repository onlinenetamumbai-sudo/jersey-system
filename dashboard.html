<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>TEAM ORDER DETAILS</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen p-4">

<script>

// LOGIN CHECK

const loggedDealer = JSON.parse(

  localStorage.getItem("loggedDealer")

);

if (!loggedDealer) {

  window.location.href = "index.html";

}

</script>

<div class="max-w-7xl mx-auto">

  <!-- HEADER -->

  <div class="bg-black text-white p-8 rounded-3xl mb-6 flex justify-between items-center">

    <div>

      <h1 class="text-4xl font-bold">

        TEAM ORDER DETAILS

      </h1>

      <p class="mt-2">

        Welcome:
        <span id="dealerName"></span>

      </p>

    </div>

    <button id="logoutBtn"
            class="bg-red-500 px-6 py-3 rounded-2xl font-bold">

      Logout

    </button>

  </div>

  <!-- MAIN GRID -->

  <div class="grid md:grid-cols-2 gap-6">

    <!-- LEFT FORM -->

    <div class="bg-white p-6 rounded-3xl shadow-xl">

      <form id="jerseyForm" class="space-y-5">

        <!-- TEAM NAME -->

        <div>

          <label class="font-semibold">

            Team Name

          </label>

          <input type="text"
                 id="teamName"
                 required
                 class="w-full border rounded-xl p-3 mt-2">

        </div>

        <!-- PLAYER NAME -->

        <div>

          <label class="font-semibold">

            Player Name

          </label>

          <input type="text"
                 id="jerseyName"
                 required
                 class="w-full border rounded-xl p-3 mt-2">

        </div>

        <!-- SIZE -->

        <div>

          <label class="font-semibold">

            Jersey Size

          </label>

          <select id="jerseySize"
                  required
                  class="w-full border rounded-xl p-3 mt-2">

            <option value="">
              Select Size
            </option>

            <option>20</option>
            <option>22</option>
            <option>24</option>
            <option>26</option>
            <option>28</option>
            <option>30</option>
            <option>32</option>
            <option>34</option>
            <option>36</option>
            <option>38</option>
            <option>40</option>
            <option>42</option>
            <option>44</option>
            <option>46</option>
            <option>48</option>
            <option>50</option>
            <option>52</option>
            <option>54</option>
            <option>56</option>
            <option>58</option>
            <option>60</option>

          </select>

        </div>

        <!-- TYPE -->

        <div>

          <label class="font-semibold">

            Jersey Type

          </label>

          <select id="jerseyType"
                  required
                  class="w-full border rounded-xl p-3 mt-2">

            <option value="">
              Select Type
            </option>

            <option>Half Sleeve</option>
            <option>Full Sleeve</option>
            <option>Sleeveless</option>

          </select>

        </div>

        <!-- NUMBER -->

        <div>

          <label class="font-semibold">

            Jersey Number

          </label>

          <input type="text"
                 id="jerseyNumber"
                 required
                 class="w-full border rounded-xl p-3 mt-2">

        </div>

        <!-- NOTES -->

        <div>

          <label class="font-semibold">

            Notes

          </label>

          <textarea id="notes"
                    rows="4"
                    class="w-full border rounded-xl p-3 mt-2"></textarea>

        </div>

        <!-- BUTTON -->

        <button type="submit"
                class="w-full bg-black text-white py-4 rounded-2xl font-bold">

          Add Player

        </button>

      </form>

    </div>

    <!-- RIGHT PREVIEW -->

    <div class="bg-white p-6 rounded-3xl shadow-xl">

      <div class="flex justify-between items-center mb-5">

        <h2 class="text-2xl font-bold">

          Team Players

        </h2>

        <button id="downloadPDF"
                class="bg-red-500 text-white px-5 py-2 rounded-xl hidden">

          PDF

        </button>

      </div>

      <div id="preview">

        No Players Added

      </div>

      <div class="flex gap-3 mt-5">

        <button id="saveBtn"
                class="bg-green-500 text-white px-5 py-3 rounded-xl hidden">

          Save Team

        </button>

        <button id="clearBtn"
                class="bg-gray-700 text-white px-5 py-3 rounded-xl hidden">

          Clear

        </button>

      </div>

    </div>

  </div>

</div>

<script>

// DEALER NAME

document.getElementById("dealerName")

.innerText = loggedDealer.name;


// LOGOUT

document.getElementById("logoutBtn")

.addEventListener("click", function() {

  localStorage.removeItem("loggedDealer");

  window.location.href = "index.html";

});


// GOOGLE SCRIPT URL

const scriptURL = "https://script.google.com/macros/s/AKfycbzsK4HlGf-1SmHjaVs_N8Sx6yJgRQ4f69HLD5al_Q0-MKLY6BY_qx3beqTwET5P94DP5g/exec";


// STORAGE

let orders = [];


// ELEMENTS

const form = document.getElementById("jerseyForm");

const preview = document.getElementById("preview");

const saveBtn = document.getElementById("saveBtn");

const clearBtn = document.getElementById("clearBtn");

const pdfBtn = document.getElementById("downloadPDF");

const teamNameInput =

document.getElementById("teamName");


// ADD PLAYER

form.addEventListener("submit", function(e) {

  e.preventDefault();

  // VALIDATION

  if (

    !teamNameInput.value ||

    !document.getElementById("jerseyName").value ||

    !document.getElementById("jerseySize").value ||

    !document.getElementById("jerseyType").value ||

    !document.getElementById("jerseyNumber").value

  ) {

    alert("Please Fill All Fields");

    return;

  }

  const order = {

    teamName:

      teamNameInput.value,

    jerseyName:

      document.getElementById("jerseyName").value,

    jerseySize:

      document.getElementById("jerseySize").value,

    jerseyType:

      document.getElementById("jerseyType").value,

    jerseyNumber:

      document.getElementById("jerseyNumber").value,

    notes:

      document.getElementById("notes").value

  };

  orders.push(order);

  renderTable();

  // RESET ONLY PLAYER FIELDS

  document.getElementById("jerseyName").value = "";

  document.getElementById("jerseySize").value = "";

  document.getElementById("jerseyType").value = "";

  document.getElementById("jerseyNumber").value = "";

  document.getElementById("notes").value = "";

});


// TABLE

function renderTable() {

  let html = `

  <table class="w-full border">

    <thead>

      <tr class="bg-black text-white">

        <th class="border p-2">SR</th>

        <th class="border p-2">PLAYER</th>

        <th class="border p-2">SIZE</th>

        <th class="border p-2">TYPE</th>

        <th class="border p-2">NUMBER</th>

      </tr>

    </thead>

    <tbody>

  `;

  orders.forEach((order, index) => {

    html += `

    <tr>

      <td class="border p-2">

        ${index + 1}

      </td>

      <td class="border p-2">

        ${order.jerseyName}

      </td>

      <td class="border p-2">

        ${order.jerseySize}

      </td>

      <td class="border p-2">

        ${order.jerseyType}

      </td>

      <td class="border p-2">

        ${order.jerseyNumber}

      </td>

    </tr>

    `;

  });

  html += `</tbody></table>`;

  preview.innerHTML = html;

  saveBtn.classList.remove("hidden");

  clearBtn.classList.remove("hidden");

  pdfBtn.classList.remove("hidden");

}


// SAVE TEAM

saveBtn.addEventListener("click", async function() {

  try {

    await fetch(scriptURL, {

      method: "POST",

      body: JSON.stringify({

        dealerName: loggedDealer.name,

        dealerMobile: loggedDealer.mobile,

        teamName:

          document.getElementById("teamName").value,

        players: orders

      })

    });

    alert("Team Saved Successfully");

  }

  catch(error) {

    console.error(error);

    alert("Error Saving Team");

  }

});


// CLEAR

clearBtn.addEventListener("click", function() {

  orders = [];

  preview.innerHTML = "No Players Added";

  saveBtn.classList.add("hidden");

  clearBtn.classList.add("hidden");

  pdfBtn.classList.add("hidden");

  teamNameInput.value = "";

});


// PDF

pdfBtn.addEventListener("click", function() {

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  const now = new Date();

  doc.setFontSize(22);

  doc.text("TEAM ORDER DETAILS", 20, 20);

  doc.setFontSize(12);

  doc.text(

    "Dealer: " + loggedDealer.name,

    20,

    35

  );

  doc.text(

    "Mobile: " + loggedDealer.mobile,

    20,

    45

  );

  doc.text(

    "Team: " +

    document.getElementById("teamName").value,

    20,

    55

  );

  doc.text(

    "Generated: " +

    now.toLocaleDateString() +

    " " +

    now.toLocaleTimeString(),

    20,

    65

  );

  // HEADER

  let y = 85;

  doc.rect(20, y, 170, 10);

  doc.text("SR", 25, y + 7);

  doc.text("PLAYER", 45, y + 7);

  doc.text("SIZE", 90, y + 7);

  doc.text("TYPE", 120, y + 7);

  doc.text("NUMBER", 160, y + 7);

  y += 10;

  // PLAYERS

  orders.forEach((order, index) => {

    doc.rect(20, y, 170, 10);

    doc.text(String(index + 1), 25, y + 7);

    doc.text(order.jerseyName, 45, y + 7);

    doc.text(order.jerseySize, 90, y + 7);

    doc.text(order.jerseyType, 120, y + 7);

    doc.text(order.jerseyNumber, 160, y + 7);

    y += 10;

  });

  y += 20;

  doc.text(

    "Generated by Sports Jersey Design",

    20,

    y

  );

  doc.save("team-order-details.pdf");

});

</script>

</body>
</html>
