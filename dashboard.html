<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>TEAM ORDER DETAILS</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-200 p-4 md:p-8">

<script>

  // LOGIN CHECK

  const loggedDealer =
    JSON.parse(localStorage.getItem("loggedDealer"));

  if (!loggedDealer) {

    window.location.href = "index.html";

  }

</script>

<!-- HEADER -->

<div class="bg-black text-white rounded-3xl p-6 md:p-8 flex justify-between items-center mb-6">

  <div>

    <h1 class="text-3xl md:text-5xl font-bold">

      TEAM ORDER DETAILS

    </h1>

    <p class="mt-3 text-lg">

      Welcome:
      <span id="dealerName"></span>

    </p>

  </div>

  <button id="logoutBtn"
          class="bg-red-500 px-6 py-4 rounded-2xl text-lg font-bold">

    Logout

  </button>

</div>

<!-- MAIN -->

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

  <!-- LEFT -->

  <div class="bg-white rounded-3xl p-6 shadow-lg">

    <!-- TEAM NAME -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Team Name

      </label>

      <input type="text"
             id="teamName"
             class="w-full border rounded-2xl p-4 mt-2 text-lg">

    </div>

    <!-- PLAYER NAME -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Player Name

      </label>

      <input type="text"
             id="playerName"
             class="w-full border rounded-2xl p-4 mt-2 text-lg">

    </div>

    <!-- SIZE -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Jersey Size

      </label>

      <select id="jerseySize"
              class="w-full border rounded-2xl p-4 mt-2 text-lg">

        <option value="">Select Size</option>

        <option>20</option>
        <option>22</option>
        <option>24</option>
        <option>26</option>
        <option>28</option>
        <option>30</option>
        <option>32</option>
        <option>34</option>
        <option>36</option>
        <option>38</option>
        <option>40</option>
        <option>42</option>
        <option>44</option>
        <option>46</option>
        <option>48</option>
        <option>50</option>
        <option>52</option>

      </select>

    </div>

    <!-- TYPE -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Jersey Type

      </label>

      <select id="jerseyType"
              class="w-full border rounded-2xl p-4 mt-2 text-lg">

        <option value="">Select Type</option>

        <option>Half Sleeve</option>
        <option>Full Sleeve</option>
        <option>Sleeveless</option>

      </select>

    </div>

    <!-- NUMBER -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Jersey Number

      </label>

      <input type="text"
             id="jerseyNumber"
             class="w-full border rounded-2xl p-4 mt-2 text-lg">

    </div>

    <!-- NOTES -->

    <div class="mb-5">

      <label class="font-bold text-xl">

        Notes

      </label>

      <textarea id="notes"
                rows="5"
                class="w-full border rounded-2xl p-4 mt-2 text-lg"></textarea>

    </div>

    <!-- NOTE -->

    <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded-xl mb-5">

      <p class="font-bold text-yellow-900">

        IMPORTANT NOTE

      </p>

      <p class="text-yellow-800">

        Please clear the fields when you enter data for a new team.

      </p>

    </div>

    <!-- ADD BUTTON -->

    <button id="addPlayerBtn"
            class="w-full bg-black text-white p-5 rounded-2xl text-xl font-bold">

      Add Player

    </button>

  </div>

  <!-- RIGHT -->

  <div class="bg-white rounded-3xl p-6 shadow-lg">

    <div class="flex justify-between items-center mb-6">

      <h2 class="text-3xl font-bold">

        Team Players

      </h2>

      <button id="pdfBtn"
              class="bg-red-500 text-white px-6 py-3 rounded-2xl text-xl">

        PDF

      </button>

    </div>

    <!-- TABLE -->

    <div class="overflow-auto">

      <table class="w-full border">

        <thead>

          <tr class="bg-black text-white">

            <th class="border p-3 w-10">SR</th>
            <th class="border p-3">PLAYER</th>
            <th class="border p-3">SIZE</th>
            <th class="border p-3">TYPE</th>
            <th class="border p-3">NUMBER</th>
            <th class="border p-3">ACTION</th>

          </tr>

        </thead>

        <tbody id="previewTable"></tbody>

      </table>

    </div>

    <!-- BUTTONS -->

    <div class="mt-6 flex gap-4">

      <button id="saveBtn"
              class="bg-green-500 text-white px-6 py-4 rounded-2xl text-xl font-bold">

        Save Team

      </button>

      <button id="clearBtn"
              class="bg-gray-700 text-white px-6 py-4 rounded-2xl text-xl font-bold">

        Clear

      </button>

    </div>

  </div>

</div>

<script>

  // GOOGLE SCRIPT URL

  const scriptURL =
    "https://script.google.com/macros/s/AKfycbzoOLyybFoSR-BonHEH_7FxSKkyPwMGqle1Qzlx771iZ6Fxnc4DdKp4yrGoOcJVGalH0g/exec";

  // DEALER NAME

  document.getElementById("dealerName")
    .innerText = loggedDealer.name;

  // ORDERS ARRAY

  let orders = [];

  // TABLE BODY

  const previewTable =
    document.getElementById("previewTable");

  // ADD PLAYER

  document.getElementById("addPlayerBtn")

  .addEventListener("click", function () {

    const teamName =
      document.getElementById("teamName").value;

    const playerName =
      document.getElementById("playerName").value;

    const jerseySize =
      document.getElementById("jerseySize").value;

    const jerseyType =
      document.getElementById("jerseyType").value;

    const jerseyNumber =
      document.getElementById("jerseyNumber").value;

    const notes =
      document.getElementById("notes").value;

    // VALIDATION

    if (

      !teamName ||
      !playerName ||
      !jerseySize ||
      !jerseyType ||
      !jerseyNumber

    ) {

      alert("Please Fill All Fields");

      return;

    }

    // PUSH PLAYER

    orders.push({

      jerseyName: playerName,

      jerseySize,

      jerseyType,

      jerseyNumber,

      notes

    });

    renderTable();

    // RESET PLAYER FIELDS ONLY

    document.getElementById("playerName").value = "";

    document.getElementById("jerseySize").value = "";

    document.getElementById("jerseyType").value = "";

    document.getElementById("jerseyNumber").value = "";

    document.getElementById("notes").value = "";

  });

  // RENDER TABLE

  function renderTable() {

    previewTable.innerHTML = "";

    orders.forEach((player, index) => {

      previewTable.innerHTML += `

        <tr>

          <td class="border p-3 text-center">

            ${index + 1}

          </td>

          <td class="border p-3">

            ${player.jerseyName}

          </td>

          <td class="border p-3 text-center">

            ${player.jerseySize}

          </td>

          <td class="border p-3 text-center">

            ${player.jerseyType}

          </td>

          <td class="border p-3 text-center">

            ${player.jerseyNumber}

          </td>

          <td class="border p-3 text-center">

            <button
              onclick="deletePlayer(${index})"
              class="bg-red-500 text-white px-4 py-2 rounded-xl">

              Delete

            </button>

          </td>

        </tr>

      `;

    });

  }

  // DELETE PLAYER

  function deletePlayer(index) {

    orders.splice(index, 1);

    renderTable();

  }

  // SAVE TEAM

  document.getElementById("saveBtn")

  .addEventListener("click", function () {

    if (orders.length === 0) {

      alert("No Players Added");

      return;

    }

    const finalData = {

      dealerName: loggedDealer.name,

      dealerMobile: loggedDealer.mobile,

      teamName:
        document.getElementById("teamName").value,

      totalQty: orders.length,

      players: orders

    };

    fetch(scriptURL, {

      method: "POST",

      mode: "no-cors",

      headers: {

        "Content-Type":
          "text/plain;charset=utf-8"

      },

      body: JSON.stringify(finalData)

    })

    .then(() => {

      alert("Team Saved Successfully");

    })

    .catch((err) => {

      console.log(err);

      alert("Save Failed");

    });

  });

  // CLEAR

  document.getElementById("clearBtn")

  .addEventListener("click", function () {

    orders = [];

    renderTable();

    document.getElementById("teamName").value = "";

    document.getElementById("playerName").value = "";

    document.getElementById("jerseySize").value = "";

    document.getElementById("jerseyType").value = "";

    document.getElementById("jerseyNumber").value = "";

    document.getElementById("notes").value = "";

  });

  // LOGOUT

  document.getElementById("logoutBtn")

  .addEventListener("click", function () {

    localStorage.removeItem("loggedDealer");

    window.location.href = "index.html";

  });

  // PDF

  document.getElementById("pdfBtn")

  .addEventListener("click", function () {

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    const teamName =
      document.getElementById("teamName").value;

    const currentDate =
      new Date().toLocaleString();

    doc.setFontSize(22);

    doc.text("TEAM ORDER DETAILS", 20, 20);

    doc.setFontSize(12);

    doc.text(

      "Generated by Sports Jersey Design",

      20,

      30

    );

    doc.text(

      "Date & Time: " + currentDate,

      20,

      40

    );

    doc.text(

      "Team Name: " + teamName,

      20,

      50

    );

    doc.text(

      "Total Qty: " + orders.length,

      20,

      60

    );

    let y = 80;

    doc.text("SR", 20, y);
    doc.text("PLAYER", 40, y);
    doc.text("SIZE", 90, y);
    doc.text("TYPE", 120, y);
    doc.text("NUMBER", 170, y);

    y += 10;

    orders.forEach((player, index) => {

      doc.text(String(index + 1), 20, y);

      doc.text(player.jerseyName, 40, y);

      doc.text(player.jerseySize, 90, y);

      doc.text(player.jerseyType, 120, y);

      doc.text(player.jerseyNumber, 170, y);

      y += 10;

    });

    doc.save("team-order.pdf");

  });

</script>

</body>
</html>
